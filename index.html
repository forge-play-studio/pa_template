<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Playable Ad</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        font-family:
          system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue',
          Arial, sans-serif;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }
      #renderCanvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="renderCanvas" touch-action="none"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

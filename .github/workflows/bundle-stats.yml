name: Bundle Stats

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. This runs daily at 19:37 Asia/Shanghai.
    - cron: '37 11 * * *'

permissions:
  contents: read
  issues: write

jobs:
  bundle-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Compute report date
        id: report-date
        shell: bash
        run: echo "date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and capture log
        id: build
        shell: bash
        run: |
          set +e
          pnpm run build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Analyze bundle stats
        if: always()
        run: node scripts/analyze-bundle-stats.mjs --build-exit-code "${{ steps.build.outputs.exit_code }}"

      - name: Upload bundle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report-${{ steps.report-date.outputs.date }}
          if-no-files-found: ignore
          path: |
            dist/index.html
            dist/stats.html
            dist/stats.json
            dist/**/*.html
            build.log
            bundle-stats-report/**

      - name: Upload playable HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-html-${{ steps.report-date.outputs.date }}
          if-no-files-found: error
          path: dist/index.html

      - name: Upload bundle stats HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stats-html-${{ steps.report-date.outputs.date }}
          if-no-files-found: error
          path: dist/stats.html

      - name: Create or update issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          report_date="${{ steps.report-date.outputs.date }}"
          bundle_over_5mb="$(node - <<'NODE'
          const fs = require('node:fs');
          const limitBytes = 5 * 1024 * 1024;
          let result = '未知';
          try {
            const summary = JSON.parse(fs.readFileSync('bundle-stats-report/summary.json', 'utf8'));
            const output = (summary.htmlOutputs || []).find((item) => item.file === 'dist/index.html') || summary.htmlOutputs?.[0];
            if (output && Number.isFinite(output.bytes)) {
              result = output.bytes > limitBytes ? '是' : '否';
            }
          } catch {
            result = '未知';
          }
          process.stdout.write(result);
          NODE
          )"
          issue_key="[Daily bundle report][${report_date}]"
          issue_title="${issue_key}包体是否超过5mb：${bundle_over_5mb}"
          gh label create "bundle-stats" --color "0E8A16" --description "Daily bundle size analysis" 2>/dev/null || true
          gh label create "auto-generated" --color "EDEDED" --description "Created automatically by GitHub Actions" 2>/dev/null || true
          existing=$(gh issue list --state all --search "\"${issue_key}\" in:title" --json number,title --jq ".[] | select(.title | startswith(\"${issue_key}\")) | .number" | head -n 1)
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$issue_title" --body-file bundle-stats-report/issue.md --add-label "bundle-stats,auto-generated"
          else
            gh issue create --title "$issue_title" --body-file bundle-stats-report/issue.md --label "bundle-stats,auto-generated"
          fi

      - name: Fail workflow if build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit "${{ steps.build.outputs.exit_code }}"
